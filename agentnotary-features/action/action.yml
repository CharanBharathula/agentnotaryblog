name: AgentNotary CI
description: Verify agent seal, run dry-run adversarial tests, and check compliance on every PR.
author: CharanBharathula
branding:
  icon: lock
  color: green

inputs:
  manifest:
    description: Path to the agentnotary.yaml manifest
    required: false
    default: agentnotary.yaml
  python-version:
    description: Python version to use
    required: false
    default: "3.11"
  fail-on-drift:
    description: Fail the workflow when seal --verify detects drift
    required: false
    default: "true"
  attack-mode:
    description: One of "skip" | "dry-run" | "live" (live requires API key)
    required: false
    default: dry-run
  compliance-standard:
    description: Compliance standard to check (eu-ai-act, nist-ai-rmf, iso-42001, none)
    required: false
    default: none
  doctor-strict:
    description: Fail on WARN-level doctor checks
    required: false
    default: "false"

outputs:
  score:
    description: AgentNotary Score (0-100)
    value: ${{ steps.doctor.outputs.score }}
  badge-url:
    description: Shields.io badge URL for the score
    value: ${{ steps.doctor.outputs.badge_url }}
  drift-detected:
    description: "true if seal --verify found drift"
    value: ${{ steps.seal.outputs.drift }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install AgentNotary
      shell: bash
      run: pip install --quiet "agentnotary[all]"

    - name: Validate manifest
      shell: bash
      run: agentnotary validate --manifest "${{ inputs.manifest }}"

    - name: Verify seal
      id: seal
      shell: bash
      run: |
        set +e
        agentnotary seal --verify --manifest "${{ inputs.manifest }}"
        rc=$?
        if [ $rc -ne 0 ]; then
          echo "drift=true" >> "$GITHUB_OUTPUT"
          if [ "${{ inputs.fail-on-drift }}" = "true" ]; then exit $rc; fi
        else
          echo "drift=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Adversarial scan
      if: ${{ inputs.attack-mode != 'skip' }}
      shell: bash
      run: |
        flag=""
        if [ "${{ inputs.attack-mode }}" = "live" ]; then flag="--live"; else flag="--dry-run"; fi
        agentnotary attack $flag --manifest "${{ inputs.manifest }}"

    - name: Compliance check
      if: ${{ inputs.compliance-standard != 'none' }}
      shell: bash
      run: agentnotary compliance --check --standard "${{ inputs.compliance-standard }}" --manifest "${{ inputs.manifest }}"

    - name: AgentNotary Doctor
      id: doctor
      shell: bash
      run: |
        set +e
        agentnotary doctor --json > .agentnotary-doctor.json
        rc=$?
        score=$(python -c "import json; print(json.load(open('.agentnotary-doctor.json'))['score'])")
        badge=$(python -c "import json; print(json.load(open('.agentnotary-doctor.json'))['badge_url'])")
        echo "score=$score" >> "$GITHUB_OUTPUT"
        echo "badge_url=$badge" >> "$GITHUB_OUTPUT"
        agentnotary doctor --fix
        if [ "${{ inputs.doctor-strict }}" = "true" ]; then exit $rc; fi
        if [ $rc -eq 1 ]; then exit 1; fi    # always fail on FAIL
        exit 0

    - name: PR comment with score
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const r = JSON.parse(fs.readFileSync('.agentnotary-doctor.json', 'utf8'));
          const lines = [
            `### 🔒 AgentNotary Score: **${r.score}/100**`,
            ``,
            `![score](${r.badge_url})`,
            ``,
            `| Check | Status | Detail |`,
            `|---|---|---|`,
            ...r.checks.map(c => `| ${c.name} | ${c.status} | ${c.message} |`),
          ];
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: lines.join('\n'),
          });
